name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git ccache libffi-dev libssl-dev \
          python3-dev python3-pip zip unzip \
          liblzma-dev libsqlite3-dev zlib1g-dev openjdk-17-jdk
    
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'SPEC'
[app]
title = A34 Master Tool
package.name = a34master
package.domain = org.ranjha
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 0.5
requirements = python3,kivy,kivymd,pillow
orientation = portrait
android.api = 30
android.minapi = 21
android.ndk = 23c
android.sdk = 30
android.archs = arm64-v8a
android.permissions = INTERNET, CAMERA, RECORD_AUDIO, ACCESS_FINE_LOCATION, BODY_SENSORS
log_level = 2
SPEC
        
        # Create icon if missing
        if [ ! -f icon.png ]; then
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > icon.png
        fi
    
    - name: Build APK
      run: |
        yes | buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: A34-Master-Tool
        path: bin/*.apk
