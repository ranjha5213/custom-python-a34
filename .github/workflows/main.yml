name: AI Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential ccache git libffi-dev libssl-dev           python3 python3-setuptools python3-pip python3-dev           zip zlib1g-dev libncurses5 libstdc++6           libgtk-3-dev libgstreamer1.0-dev
          pip install --upgrade pip
          pip install buildozer Cython==0.29.33

      - name: Build with Buildozer
        run: |
          # The 'yes' command handles the SDK license prompts
          yes | buildozer -v android debug
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: A34-Master-APK
          path: bin/*.apk
